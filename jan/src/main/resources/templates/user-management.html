<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS | Nexus Identity</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050810;
            --card: rgba(30, 41, 59, 0.4);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --success: #10b981;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #050810);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 40px;
            min-height: 100vh;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 30px auto;
        }

        .header-section h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            transition: 0.3s;
        }

        .back-link:hover { color: white; background: rgba(255, 255, 255, 0.08); transform: translateX(-5px); }

        .card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 30px;
            margin-bottom: 30px;
            max-width: 1200px;
            margin: 0 auto 30px auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h3 { font-size: 18px; font-weight: 700; color: #fff; margin-top: 0; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }

        .form-inline { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; align-items: end; }
        
        .input-group label {
            display: block;
            font-size: 10px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

        .pass-container { position: relative; }
        .toggle-btn {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            font-size: 9px; font-weight: 800; color: var(--accent); cursor: pointer;
            background: rgba(99, 102, 241, 0.1); padding: 4px 8px; border-radius: 6px;
        }

        .btn-save {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 8px 15px var(--accent-glow); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; font-size: 11px; text-transform: uppercase; color: var(--accent); border-bottom: 1px solid var(--border); }
        td { padding: 18px 15px; border-bottom: 1px solid var(--border); font-size: 14px; }

        .role-badge {
            padding: 5px 12px; border-radius: 10px; font-size: 11px; font-weight: 800;
            background: rgba(99, 102, 241, 0.1); color: var(--accent); border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .user-link {
            color: #fff; font-weight: 700; cursor: pointer;
            border-bottom: 1px dashed var(--accent); transition: 0.2s;
        }
        .user-link:hover { color: var(--accent); border-bottom-style: solid; }

        .search-wrapper { position: relative; width: 300px; }
        .search-input { padding-left: 40px !important; }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); opacity: 0.5; }

        .modal { 
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
        }
        .modal-content { 
            background: #0f172a; margin: 5% auto; padding: 40px; border-radius: 28px; 
            width: 400px; border: 1px solid var(--accent); box-shadow: 0 0 50px var(--accent-glow);
        }

        .alert-success {
            max-width: 1200px; margin: 0 auto 20px auto; padding: 15px; border-radius: 14px;
            background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); text-align: center;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>Identity Registry</h1>
        <a th:href="@{/menu}" class="back-link">← System Core</a>
    </div>

    <div th:if="${message}" class="alert-success" th:text="${message}"></div>

    <div class="card" sec:authorize="hasRole('ADMIN')">
        <h3><span>👤</span> Provision New Access</h3>
        <form th:action="@{/users/add}" th:object="${newUser}" method="post" class="form-inline" id="userForm">
            <div class="input-group">
                <label>System Identifier</label>
                <input type="text" th:field="*{username}" placeholder="Username" required>
            </div>
            <div class="input-group">
                <label>Communication Email</label>
                <input type="email" th:field="*{email}" placeholder="Email" required>
            </div>
            <div class="input-group">
                <label>Access Key</label>
                <div class="pass-container">
                    <input type="password" th:field="*{password}" id="p1" placeholder="Password" required>
                    <span class="toggle-btn" onclick="togglePass('p1')">VIEW</span>
                </div>
            </div>
            <div class="input-group">
                <label>Verify Protocol</label>
                <div class="pass-container">
                    <input type="password" name="confirmPassword" id="p2" placeholder="Confirm" required>
                    <span id="matchError" style="display:none; color: var(--danger); font-size: 9px; position: absolute; bottom: -15px;">Mismatched!</span>
                </div>
            </div>
            <div class="input-group">
                <label>Clearance Level</label>
                <select th:field="*{role}">
                    <option value="ROLE_STAFF">Staff</option>
                    <option value="ROLE_CO-ADMIN">Co-Admin</option> <option value="ROLE_ADMIN">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn-save" id="submitBtn">Deploy User</button>
        </form>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h3><span>🛡️</span> Active Credentials</h3>
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="userSearch" class="search-input" placeholder="Search identities..." onkeyup="searchTable()">
            </div>
        </div>

        <table id="userTable">
            <thead>
                <tr>
                    <th>Identity</th>
                    <th>Email</th>
                    <th>Clearance</th>
                    <th sec:authorize="hasRole('ADMIN')">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${users}">
                    <td>
                        <span class="user-link" th:text="${u.username}" 
                              th:data-id="${u.id}" th:data-user="${u.username}"
                              th:data-email="${u.email}" th:data-role="${u.role}"
                              onclick="openDetails(this)"></span>
                    </td>
                    <td th:text="${u.email}" style="color: var(--text-muted);"></td>
                    <td><span class="role-badge" th:text="${u.role.replace('ROLE_', '')}"></span></td>
                    <td sec:authorize="hasRole('ADMIN')">
                        <a th:if="${#authentication.name != u.username}" 
                           th:href="@{/users/delete/{id}(id=${u.id})}" 
                           style="color:var(--danger); text-decoration:none; font-size: 11px; font-weight: 800;" 
                           onclick="return confirm('Revoke system access for this identity?')">REVOKE ACCESS</a>
                        <span th:if="${#authentication.name == u.username}" style="color: var(--text-muted); font-size: 11px; font-style: italic;">(Active Session)</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; border-bottom: 1px solid var(--border); padding-bottom: 15px;">Modify Credentials</h3>
            
            <form th:action="@{/users/update}" method="post" style="margin-top: 20px;">    
                <input type="hidden" name="id" id="detId">
                
                <div class="input-group" style="margin-bottom:20px;">
                    <label>Identity (Immutable)</label>
                    <input type="text" id="detUser" disabled style="opacity:0.5; background: rgba(0,0,0,0.2);">
                </div>

                <div class="input-group" style="margin-bottom:20px;">
                    <label>Communication Email</label>
                    <input type="email" name="email" id="detEmail" required>
                </div>

                <div class="input-group" style="margin-bottom:20px;">
                    <label>Override Access Key</label>
                    <div class="pass-container">
                        <input type="password" name="password" id="detPass" placeholder="Leave blank to retain current">
                        <span class="toggle-btn" onclick="togglePass('detPass')">VIEW</span>
                    </div>
                </div>

                <div class="input-group" style="margin-bottom:30px;">
                    <label>Update Clearance</label>
                    <select name="role" id="detRole">
                        <option value="ROLE_STAFF">Staff</option>
                        <option value="ROLE_CO-ADMIN">Co-Admin</option> <option value="ROLE_ADMIN">Admin</option>
                    </select>
                </div>

                <button type="submit" class="btn-save" style="width:100%;">Commit Updates</button>
                <button type="button" onclick="closeDetails()" style="width:100%; background:transparent; border:none; color:var(--text-muted); margin-top:15px; cursor:pointer; font-weight:600;">Discard Changes</button>
            </form>
        </div>
    </div>

    <script>
        const modal = document.getElementById("detailsModal");

        function openDetails(el) {
            document.getElementById("detId").value = el.getAttribute("data-id");
            document.getElementById("detUser").value = el.getAttribute("data-user");
            document.getElementById("detEmail").value = el.getAttribute("data-email");
            document.getElementById("detRole").value = el.getAttribute("data-role");
            document.getElementById("detPass").value = ""; 
            modal.style.display = "block";
        }

        function closeDetails() { modal.style.display = "none"; }
        window.onclick = (e) => { if(e.target == modal) closeDetails(); }

        function togglePass(id) {
            const x = document.getElementById(id);
            const btn = x.nextElementSibling;
            x.type = x.type === "password" ? "text" : "password";
            btn.innerText = x.type === "password" ? "VIEW" : "HIDE";
        }

        function searchTable() {
            const filter = document.getElementById("userSearch").value.toLowerCase();
            const rows = document.querySelectorAll("#userTable tbody tr");
            rows.forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(filter) ? "" : "none";
            });
        }

        const p1 = document.getElementById("p1"), p2 = document.getElementById("p2"), err = document.getElementById("matchError"), btn = document.getElementById("submitBtn");
        function validate() {
            if (p2.value.length > 0) {
                const match = p1.value === p2.value;
                err.style.display = match ? "none" : "block";
                p2.style.borderColor = match ? "var(--success)" : "var(--danger)";
                btn.disabled = !match;
            }
        }
        p1.addEventListener('input', validate);
        p2.addEventListener('input', validate);
    </script>
</body>
</html>
