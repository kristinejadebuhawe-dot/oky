<!DOCTYPE html>
<html lang="en" 
      xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS | Nexus Personnel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050810;
            --card: rgba(30, 41, 59, 0.4);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --success: #10b981;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #050810);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 40px;
            min-height: 100vh;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 40px auto;
        }

        .header-section h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            transition: 0.3s;
        }

        .back-link:hover { color: white; background: rgba(255, 255, 255, 0.08); transform: translateX(-5px); }

        .card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 30px;
            margin-bottom: 30px;
            max-width: 1200px;
            margin: 0 auto 30px auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .section-title { font-size: 18px; font-weight: 700; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }

        .form-grid { 
            display: grid; 
            grid-template-columns: 1.5fr 1fr 1fr 1fr; 
            gap: 15px; 
            align-items: end; 
        }

        .input-group label {
            display: block;
            font-size: 10px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            outline: none;
            transition: 0.3s;
        }

        .btn-save {
            background: var(--accent);
            color: white;
            border: none;
            height: 45px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 8px 15px var(--accent-glow); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px 10px; font-size: 11px; text-transform: uppercase; color: var(--accent); border-bottom: 1px solid var(--border); }
        td { padding: 18px 10px; border-bottom: 1px solid var(--border); font-size: 14px; }

        .wage-badge { color: var(--success); font-weight: 700; }
        .role-badge { 
            padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: 800;
            background: rgba(99, 102, 241, 0.1); color: var(--accent); border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .update-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 12px; transition: 0.2s; }
        .update-btn:hover { background: var(--accent); color: white; }

        /* --- Modal --- */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); }
        .modal-content { background: #0f172a; margin: 10% auto; padding: 40px; border-radius: 28px; width: 400px; border: 1px solid var(--accent); box-shadow: 0 0 40px var(--accent-glow); }

        .alert-success { max-width: 1200px; margin: 0 auto 20px auto; padding: 15px; border-radius: 12px; background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); text-align: center; }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>Nexus Personnel</h1>
        <a th:href="@{/menu}" class="back-link">← System Core</a> 
    </div>

    <div th:if="${message}" class="alert-success" th:text="${message}"></div>

    <div class="card" sec:authorize="hasAnyRole('ADMIN', 'CO-ADMIN')" th:if="${not #lists.isEmpty(availableUsers)}">
        <h3 class="section-title"><span>⚡</span> Activate Worker Profile</h3>
        <form th:action="@{/labor/activate}" method="post">
            <div class="form-grid">
                <div class="input-group">
                    <label>Select System Identity</label>
                    <select name="userId" required>
                        <option th:each="u : ${availableUsers}" th:value="${u.id}" th:text="${u.username + ' (' + u.role + ')'}"></option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Designation</label>
                    <input type="text" name="position" placeholder="e.g. Lead Staff" required>
                </div>
                <div class="input-group">
                    <label>Daily Wage (₱)</label>
                    <input type="number" step="0.01" name="dailyWage" placeholder="0.00" required>
                </div>
                <button type="submit" class="btn-save">Activate Profile</button>
            </div>
        </form>
    </div>

    <div class="card">
        <h3 class="section-title"><span>📊</span> Personnel Metrics & Monitoring</h3>
        <table>
            <thead>
                <tr>
                    <th>Identity</th>
                    <th>Clearance</th>
                    <th>Position</th>
                    <th>Daily Wage</th>
                    <th>Status</th>
                    <th sec:authorize="hasAnyRole('ADMIN', 'CO-ADMIN')">Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="l : ${labors}">
                    <td th:text="${l.systemAccount?.username}" style="font-weight: 800;"></td>
                    <td><span class="role-badge" th:text="${l.systemAccount?.role?.replace('ROLE_', '')}"></span></td>
                    <td th:text="${l.position}"></td>
                    <td class="wage-badge" th:text="${'₱' + l.dailyWage}"></td>
                    <td>
                        <span th:text="${l.active ? 'ACTIVE' : 'INACTIVE'}" 
                              th:style="${l.active ? 'color:var(--success); font-weight:800; font-size:11px;' : 'color:var(--danger); font-weight:800; font-size:11px;'}">
                        </span>
                    </td>
                    <td sec:authorize="hasAnyRole('ADMIN', 'CO-ADMIN')">
                        <button class="update-btn" th:onclick="openEditModal([[${l.id}]], [[${l.position}]], [[${l.dailyWage}]], [[${l.active}]])">
                            Update Metrics
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="editModal" class="modal" sec:authorize="hasAnyRole('ADMIN', 'CO-ADMIN')">
        <div class="modal-content">
            <h3 class="section-title"><span>🛠️</span> Update Metrics</h3>
            <form th:action="@{/labor/update}" method="post">
                <input type="hidden" name="id" id="editId">
                
                <div class="input-group" style="margin-bottom: 15px;">
                    <label>Position</label>
                    <input type="text" name="position" id="editPosition" required>
                </div>

                <div class="input-group" style="margin-bottom: 15px;">
                    <label>Wage</label>
                    <input type="number" step="0.01" name="dailyWage" id="editWage" required>
                </div>

                <div class="input-group" style="margin-bottom: 25px;">
                    <label>Status</label>
                    <select name="active" id="editActive">
                        <option value="true">ACTIVE</option>
                        <option value="false">INACTIVE</option>
                    </select>
                </div>

                <button type="submit" class="btn-save" style="width: 100%;">Save Changes</button>
                <button type="button" onclick="closeModal()" style="width: 100%; background: transparent; border: none; color: var(--text-muted); margin-top: 10px; cursor: pointer;">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        const modal = document.getElementById('editModal');

        function openEditModal(id, position, wage, active) {
            document.getElementById('editId').value = id;
            document.getElementById('editPosition').value = position;
            document.getElementById('editWage').value = wage;
            document.getElementById('editActive').value = active.toString();
            modal.style.display = 'block';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        // Close when clicking background
        window.onclick = function(event) {
            if (event.target == modal) closeModal();
        }
    </script>

</body>
</html>
